name: TikTok authorize (one-time)

# One-time helper: exchange a TikTok OAuth authorization code for tokens and
# store them as the TIKTOK_ACCESS_TOKEN / TIKTOK_REFRESH_TOKEN secrets. The code
# is single-use and expires within minutes, so run this promptly after clicking
# the authorize link. Requires TIKTOK_CLIENT_KEY, TIKTOK_CLIENT_SECRET and
# GH_PAT (Secrets: write) to be set.

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: "The 'code' value from the redirect URL after approving access"
        required: true
      redirect_uri:
        description: "Must exactly match the redirect_uri in the authorize link"
        required: true
        default: "https://marshall-007.github.io/Business-Posts-automation/"

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests PyNaCl
      - name: Exchange code for tokens
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_AUTH_CODE: ${{ inputs.auth_code }}
          TIKTOK_REDIRECT_URI: ${{ inputs.redirect_uri }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/tiktok_exchange_code.py
