name: Deploy dashboard to GitHub Pages

# Publishes the static dashboard in docs/ to GitHub Pages.
# Requires: repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions.
# Note: GitHub Pages on a PRIVATE repo requires a paid plan. If the repo is
# private on a free plan, make it Public, or just open docs/index.html locally.

# Manual-only: run this after enabling Pages (Settings -> Pages -> Source:
# GitHub Actions). Pages requires the repo to be Public (free plan) or a paid
# plan for private repos. Until then this deploy will fail, so it does not run
# automatically on push.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
