name: Refresh social tokens

# Keeps access tokens alive and writes refreshed values back to repo secrets.
#   - Instagram: long-lived token lasts 60 days -> refreshed weekly.
#   - TikTok: access token lasts only ~24h -> refreshed every 4 hours, and the
#     rotated refresh token is persisted too.
# Requires a GH_PAT secret (fine-grained PAT with Secrets: write on this repo).

on:
  schedule:
    - cron: "0 6 * * 0"   # Instagram: Sundays 06:00 UTC
    - cron: "0 */4 * * *" # TikTok: every 4 hours
  workflow_dispatch: {}

jobs:
  instagram:
    # Weekly schedule + every manual run; skipped on the 4-hourly TikTok tick.
    if: github.event.schedule != '0 */4 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests PyNaCl
      - name: Refresh and persist Instagram token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/refresh_instagram_token.py

  tiktok:
    # 4-hourly schedule + every manual run; skipped on the weekly Instagram tick.
    if: github.event.schedule != '0 6 * * 0'
    runs-on: ubuntu-latest
    env:
      TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests PyNaCl
      - name: Refresh and persist TikTok tokens
        if: env.TIKTOK_REFRESH_TOKEN != ''
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/refresh_tiktok_token.py
