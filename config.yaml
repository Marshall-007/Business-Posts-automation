# Business profile used to generate posts. Edit everything in this file.

business:
  name: "Gwalava Boards and Furniture Fittings"
  description: >
    A furniture boards and fittings specialist with 25 years of experience.
    We supply colour boards, gloss boards and precision tops, top-quality
    hardware accessories, and offer precision cutting and edge banding
    (0.4mm, 1mm and 2mm) — every project completed with precision and expertise.
  website: ""
  tone: "friendly, professional, confident"
  audience: "furniture makers, carpenters, contractors and homeowners"
  call_to_action: "Visit us or send us a message to learn more."

# Topics the generator rotates through (recently used ones are avoided).
topics:
  - "expertise in colour boards and gloss boards for a stylish finish"
  - "precision cutting and edge banding (0.4mm, 1mm and 2mm)"
  - "top-quality hardware accessories that last"
  - "25 years of experience and what it means for your project"
  - "precision tops made for every project"
  - "why quality boards and fittings save you money long term"
  - "a common furniture-fittings question, answered"

# Default hashtags appended where the platform benefits from them.
