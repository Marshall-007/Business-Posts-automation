  contact_phone: "0813471724"
  contact_url: "https://marshall-007.github.io/Gwalava-Boards/"
  bodies:
    - "A kitchen this clean starts below the surface: quality boards, precise cuts and fittings that hold their line for years. That is what we supply, every single day."
