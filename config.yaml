# Used when no ANTHROPIC_API_KEY is configured (rotated in order).
template_posts:
  - >
    25 years of getting it right. At Gwalava Boards and Furniture Fittings we
    supply colour boards, gloss boards and precision tops — with the hardware
    to match. Whatever you're building, we help you finish it beautifully.
    Visit us or send a message to learn more.
  - >
    Precision cutting and edge banding in 0.4mm, 1mm and 2mm — clean, accurate,
    and finished to a professional standard every time. Bring us your project
    and we'll get it board-ready. Send us a message to learn more.
  - >
    A great finish starts with great fittings. From durable hinges and runners
    to top-quality handles and accessories, Gwalava Boards and Furniture
    Fittings has everything your project needs. Visit us or send a message.

# Caption engine copy for automatic campaign posting. These override the
